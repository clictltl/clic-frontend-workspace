name: Deploy Monorepo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Instala as dependências de todo o workspace de uma vez
      - name: Install dependencies
        run: npm install

      # Constrói o Chatbot
      - name: Build Chatbot
        run: npm run deploy -w apps/chatbot

      # Constrói o Graph Builder (assumindo que ele tem os mesmos scripts)
      - name: Build Graph Builder
        run: npm run deploy -w apps/graph-builder

      # Prepara a pasta final unificada para o GitHub Pages
      - name: Prepare unified dist
        run: |
          mkdir _site
          touch _site/.nojekyll
          # Copia o dist do chatbot para a subpasta /chatbot
          cp -r apps/chatbot/dist _site/chatbot
          # Copia o dist do graph-builder para a subpasta /graph-builder
          cp -r apps/graph-builder/dist _site/graph-builder

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4